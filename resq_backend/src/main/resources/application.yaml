spring:
  datasource:
      url: ${secrets.db.url}
      username: ${secrets.db.user}
      password: ${secrets.db.password}
  config:
    import: optional:classpath:secrets.yaml

  devtools:
    restart:
      enabled: false

  application:
    name: resQ-backend

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Europe/Vienna

server:
  port: 8080

logging:
  level:
    com.resq: DEBUG
    org.hibernate.SQL: DEBUG