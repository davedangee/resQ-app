services:
  postgres:
    image: postgres:16
    container_name: resq_postgres
    environment:
      POSTGRES_DB: resq_db
      POSTGRES_USER: resq_user
      POSTGRES_PASSWORD: resq_password
    ports:
      - "5432:5432"
    volumes:
      - resq_pgdata:/var/lib/postgresql/data

volumes:
  resq_pgdata: